name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run validate:primitives
      - run: npm run benchmark:history
      - run: npm run benchmark:viewport

  go:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - run: go test ./...

  desktop:
    needs: [frontend, go]
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements-build.txt
      - run: npm ci
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: npm run app:build
      - uses: actions/upload-artifact@v4
        with:
          name: Quadlo-windows-amd64
          path: build/bin/Quadlo.exe
          if-no-files-found: error
